# GCP Sovereign Cloud overlay — 8 vCPU / 16GB e2-custom Spot node.
# =============================================================================
# Overlay on docker-compose.prod.yml for the cloud soak. The host now has REAL
# cores (the 2-CPU Docker-Desktop floor is gone), so the memory-pressure /
# sensor-governor throttling from the M1 desktop overlay is NOT needed and is
# omitted — the swarm runs at full prod horizons.
#
# What IS retained from the desktop diagnosis (these are core-count-independent —
# they each block the asyncio event loop or DW lane regardless of how many cores
# the box has, so they stay off for the first clean state=applied proof):
#   - posture collector + semantic-index build run synchronously on the loop and
#     can stall it 14-45s → starve the in-flight DW SSE read. OFF.
#   - the heavy surface-health boot probe (550B model) false-degrades the whole
#     DIRECT_STREAMING lane on slow DW cold-starts. OFF.
#   - Aegis OFF for the FIRST proof (isolate the loop from the AegisForward
#     DW-streaming path; #69590 fixed the leak but the rupture validation is a
#     separate aegis-ON soak). Turn back on once that soak is green.
#
# The pin (JARVIS_DW_PRIMARY_OVERRIDE=openai/gpt-oss-120b) + pure-DW autarky are
# already supplied by deploy/ouroboros_linux_prod.env (sourced by the entrypoint)
# and overridable via the .env the startup script writes from instance metadata.
#
#   docker compose -f docker-compose.prod.yml -f docker-compose.gcp.yml up -d --build
# =============================================================================
services:
  jarvis-prod:
    environment:
      # pure DW autarky (Claude credits exhausted; safe via autarky fix #69589)
      JARVIS_PROVIDER_CLAUDE_DISABLED: "true"
      # advisory metacognition OFF the event loop (core-count-independent stalls)
      JARVIS_DIRECTION_INFERRER_ENABLED: "false"
      JARVIS_SEMANTIC_INFERENCE_ENABLED: "false"
      # don't let the heavy 550B boot probe false-degrade the DW stream lane
      JARVIS_DW_SURFACE_HEALTH_ENABLED: "false"
      # AEGIS SHIELDS UP + FULLY DYNAMIC (Sovereign Aegis Batch-Passthrough Matrix,
      # 2026-06-20). Two isolation soaks proved BOTH proxied lanes healthy end to
      # end with shields up:
      #   - RT/SSE-through-aegis  → state=applied (op-019ee41b RT soak)
      #   - BATCH-through-aegis   → files-upload + create + poll + content-retrieve
      #     all upstream_status=200, zero 4xx/5xx, → state=applied (force-batch soak)
      # The batch lane was never "ruptured"; its only real limit was payload SIZE:
      # aiohttp's 1 MiB server default + the 4 MiB passthrough cap + the 5 MiB
      # provider preflight all 413'd a MASSIVE multi-file refactor's batch JSONL.
      # The Matrix fixes that structurally (streaming constant-memory passthrough +
      # aligned 64 MiB caps + 65 MiB aiohttp ceiling) so the engine can route huge
      # ops through batch under the proxy. No tourniquet: the dynamic router is
      # ARMED and the force-batch pins are GONE — the engine evaluates each op's
      # payload itself (RT for localized fixes, batch for large refactors).
      JARVIS_AEGIS_ENABLED: "true"
      JARVIS_DW_DYNAMIC_TRANSPORT_ENABLED: "true"
      # Massive-payload ceilings (Matrix). Aegis passthrough cap MUST be >= the DW
      # provider upload preflight (both 64 MiB) so the provider rejects first with a
      # precise cause; aiohttp's server ceiling sits 1 MiB above so the proxy's clean
      # JSON 413 stays authoritative. Streaming forwarder ON (constant memory).
      JARVIS_AEGIS_MAX_REQUEST_BODY_BYTES: "67108864"
      JARVIS_DW_UPLOAD_MAX_BYTES: "67108864"
      JARVIS_AEGIS_STREAM_PASSTHROUGH: "true"
      # real cores → give DW generation full runway (no 90s reflex-cap timeouts)
      OUROBOROS_TIER0_MAX_WAIT_S: "600"
      JARVIS_GENERATION_TIMEOUT_S: "900"
      OUROBOROS_BATTLE_MAX_WALL_SECONDS: "3600"
      OUROBOROS_BATTLE_COST_CAP: "10.00"
      # Preemption Shield armed (default-on; explicit for auditability)
      JARVIS_PREEMPTION_SHIELD_ENABLED: "true"
      # --- Sovereign Telemetry & Calibration run (2026-06-20) ---
      # Telemetry Mesh: reuse the EXISTING native per-op stage profiler — emits
      # STAGE_PROMPT_ASSEMBLY / BUDGET / AEGIS_AUTH / HTTP_DISPATCH / RESPONSE_PARSE
      # timings per op. If STAGE_HTTP_DISPATCH never appears, the abort is pre-HTTP
      # (the short-circuit); if it does, the abort is in parse. Structured, not print().
      JARVIS_DISPATCH_PROFILER_ENABLED: "true"
      # INFO so the profiler's op_summary / STAGE_ trace is actually emitted (the
      # container root defaults to WARNING via a basicConfig no-op, which silences it).
      JARVIS_LOG_LEVEL: "INFO"
      # Formal Calibration Bypass: the OperationAdvisor natively greenlights ONLY the
      # blast-radius-1 seed (tests/seed/test_seed_defect.py) so the dispatch path can
      # be exercised; all other ops keep the strict heuristic gates.
      JARVIS_CALIBRATION_MODE_ENABLED: "true"
      JARVIS_CALIBRATION_TARGET_PATH: "tests/seed/test_seed_defect.py"
      # Point the TestWatcher at ONLY the calibration seed so it gets a clean
      # 1-test failure (TestFailure signal → seed op) instead of drowning it in
      # collection errors from running the whole deps-incomplete tests/ tree.
      JARVIS_INTENT_TEST_DIR: "tests/seed"
      JARVIS_INTENT_TEST_INTERVAL_S: "60"
      # ── A1 STRATEGIC IGNITION CHAIN (2026-06-22) ─────────────────────────────
      # Arm the strategic-GOAL source so this cloud node emits its first file-00
      # (the signed roadmap's GOAL-001) end-to-end and the [A1Trace] breadcrumbs
      # fire. Ported verbatim from the proven A1 venue
      # (docker-compose.dw-cortex-soak.yml). Without these the node soaks but the
      # roadmap daemon never spawns → no strategic GOAL is ever emitted (the exact
      # silent-no-op A1 exists to kill). The signed roadmap.yaml is hydrated from
      # the GCS Vault by deploy/gcp_ouroboros_startup.sh; the HMAC secret that
      # validates it travels via .env (startup writes it from instance metadata),
      # NEVER committed here.
      JARVIS_ROADMAP_READER_ENABLED: "1"          # parse signed roadmap → envelopes
      JARVIS_ROADMAP_ORCHESTRATOR_ENABLED: "1"    # the daemon that emits GOALs into intake
      JARVIS_GOAL_DECOMPOSITION_ENABLED: "1"      # GOAL → sub-goals
      JARVIS_MULTI_STEP_ORCHESTRATION_ENABLED: "1"  # sub-goals → emitted pipeline work
      JARVIS_M10_CADENCE_ENABLED: "1"             # ProposalSynthesizer cadence
      JARVIS_SUBGOAL_COMPLETION_WRITEBACK_ENABLED: "1"  # close PROPOSED→COMPLETED loop
      JARVIS_PROGRESS_LEDGER_ENABLED: "1"         # done_count / next_targets tracking
      # Autonomous-PR path: GOAL-001 edits governance files → boundary gate routes
      # it to APPROVAL_REQUIRED → ouroboros/review PR (the A1 milestone artifact,
      # human-reviewed, never auto-merged). Needs GH_TOKEN (startup writes it from
      # Secret Manager `github-token`).
      JARVIS_ORANGE_PR_ENABLED: "1"
      # A1 observability — breadcrumbs + DLQ default-true; pinned for soak audit.
      JARVIS_A1_TRACE_ENABLED: "1"
      JARVIS_INTAKE_DLQ_ENABLED: "1"

