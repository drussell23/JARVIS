# JARVIS — DW Predictive-Cortex Soak (Slices 168–176)
# =============================================================================
# A DW-ONLY soak to validate the predictive cortex on live DoubleWord traffic.
# Claude is DISABLED (JARVIS_PROVIDER_CLAUDE_DISABLED=true) — no cross-provider
# cascade — so the organism runs on DW alone and the cortex accumulates its
# intelligence (per-model rupture rings, multi-signal fusion, self-calibration)
# from real DW failures.
#
#   ./scripts/launch_dw_cortex_soak.sh                 # build + up -d + tail
#   docker compose -f docker-compose.dw-cortex-soak.yml logs -f | grep Cortex
#   docker compose -f docker-compose.dw-cortex-soak.yml down
#
# NOTE on routing impact: with Claude disabled, Slice 36 already routes
# standard/complex ops to batch, so the cortex's *preemptive reroute* is moot
# (batch either way) — but its *learning* (forecasts, calibration, per-model,
# multi-signal) runs fully and IS observable (see DW_CORTEX_SOAK.md). The
# reroute's economic impact (avoided Claude cascades) is only meaningful with a
# funded, available Claude — out of scope for a DW-only test by design.
# =============================================================================
services:
  jarvis-dw-cortex-soak:
    build:
      context: .
      dockerfile: docker/Dockerfile.soak
      args:
        SOAK_REQUIREMENTS: ${SOAK_REQUIREMENTS:-requirements-soak-oracle.txt}
        # Slice 212 — attestation stamp (launcher exports these; bare builds
        # produce an UNSTAMPED image that strict attestation refuses to boot).
        GIT_COMMIT: ${GIT_COMMIT:-unstamped}
        GIT_DIRTY: ${GIT_DIRTY:-unknown}
    image: jarvis-sovereign-soak:oracle
    container_name: jarvis-dw-cortex-soak
    working_dir: /app
    restart: always
    stop_grace_period: 30s
    env_file:
      - path: .env          # funded DOUBLEWORD_API_KEY — runtime only, never imaged
        required: false
    environment:
      # ── Slice 215 — THE FrugalGPT PER-ROUND CASCADE (DW-only era ENDS). ──
      # The DW-cortex validation purpose of this soak is long served; the soak's
      # purpose is now AUTONOMY. Claude re-enabled as the per-round rescue tier:
      # each Venom round runs DW-primary -> Claude rescues THAT round on failure
      # (per-round survival ~99.7% vs 0.7^n chain death), so chains survive
      # without paying Claude for whole chains.
      #   CHARTER (provider_topology defaults already encode it):
      #   - IMMEDIATE/COMPLEX: dw_allowed=false -> cascade_to_claude (the spine)
      #   - STANDARD: DW-primary, Claude per-round rescue
      #   - BACKGROUND/SPECULATIVE: skip_and_queue — NEVER Claude (cost shield)
      JARVIS_PROVIDER_CLAUDE_DISABLED: "false"
      # Rescue budgets (blindspot #2): the 60-120s fallback caps were tuned to
      # protect DW from Claude-starvation; as RESCUE they truncated healthy
      # mid-stream generations. Raised for generation, modest for PLAN.
      JARVIS_FALLBACK_MAX_TIMEOUT_S: "180"
      OUROBOROS_PLAN_FALLBACK_MAX_TIMEOUT_S: "120"
      # COST CONTAINMENT (operator's #1 concern — Claude spend velocity):
      #   - session cost-cap lowered 25 -> 10 in the command below: bounds the
      #     restart:always per-session-reset loophole to $10/session worst-case
      #   - telemetry sentinel armed: COST_CAP_90 fires the Discord webhook
      #     (webhook already in .env) BEFORE the cap, not after
      #   - IMMEDIATE extended thinking stays OFF; BACKGROUND/SPECULATIVE stay
      #     DW-only by topology; provider response cache (S131) default-ON
      #     dedupes repeat Claude calls
      JARVIS_TELEMETRY_SENTINEL_ENABLED: "1"
      JARVIS_THINKING_BUDGET_IMMEDIATE: "0"
      # ── The predictive cortex — the subject of this soak (172/174 are default-OFF) ──
      JARVIS_DW_PREDICTIVE_ROUTING_ENABLED: "1"      # 172 — preemptive forecast routing
      JARVIS_DW_CALIBRATION_ENABLED: "1"             # 174 — self-tuning Brier threshold
      JARVIS_DW_DYNAMIC_RECOVERY_ENABLED: "1"        # 127 — dynamic exp recovery window
      # ── Default-ON DW-arc protections (pinned explicit for the soak record) ──
      JARVIS_DW_INTRA_TRANSPORT_FAILOVER_ENABLED: "1"  # 170
      JARVIS_ECONOMIC_TELEMETRY_ENABLED: "1"            # 171
      JARVIS_DW_SURFACE_HEALTH_ENABLED: "1"            # 39/40
      # ── Cortex tuning (defaults; override to accelerate/observe in a short run) ──
      # JARVIS_DW_RUPTURE_RISK_THRESHOLD: "0.7"   # 172 initial baseline (174 self-tunes)
      # JARVIS_DW_RUPTURE_HORIZON_S: "300"        # forecast window
      # JARVIS_DW_SIGNAL_WEIGHT_ECONOMIC: "2.0"   # 176 vector weights
      # ── Slice 178: autonomous, VOLUME-AWARE workspace hygiene. ON from boot, but it
      #    only evicts above the scarcity threshold (85%) — forensic logs are preserved
      #    while disk is plentiful, so this is safe to run autonomously. ──
      JARVIS_ARTIFACT_JANITOR_ENABLED: "1"
      JARVIS_ARTIFACT_SCARCITY_THRESHOLD: "0.85"
      # JARVIS_DISCORD_MAINTENANCE_WEBHOOK: "..."   # set in .env to push eviction events
      # ── Slice 185 ledger-wipe RETIRED: the corrupted state was purged on the prior clean
      #    boot; the cortex now LEARNS from clean signals (needed by the hedge cost-optimizer).
      #    JARVIS_DW_LEDGER_WIPE_ON_BOOT intentionally absent (default-off → no wipe). ──
      # ── Slice 189/190: PROACTIVE transport-hedge — race RT vs batch, take the winner, swallow
      #    ruptures. The structural neutralization of DW instability. The cortex (172-176) is now
      #    a cost-optimizer that skips the race during a forecast storm. Outcomes recorded into
      #    the economic ledger (171): hedge_rt_wins / hedge_batch_wins / hedge_ruptures_swallowed. ──
      JARVIS_DW_TRANSPORT_HEDGE_ENABLED: "1"
      # ── Slice 219 — make DW dynamic catalog-discovery EXPLICIT so the new
      # funded key live-fetches DW's /v1/models and ranks per-route by params.
      # This auto-discovers nvidia/NVIDIA-Nemotron-3-Ultra-550B (ranks #1 for
      # COMPLEX at 550B > Qwen-397B) + Super-120B — NO hardcoded model id; the
      # classifier owns ranking. The stale May-24 cache was archived so the
      # first fetch repopulates with the live catalog. ──
      JARVIS_DW_CATALOG_DISCOVERY_ENABLED: "1"
      JARVIS_DW_CATALOG_AUTHORITATIVE: "1"
      # ── Slice 218 — arm the EXISTING multi-model runtime verification matrix
      # (verify-first: NOT a new circuit — race_triage + schema_drift_tracker +
      # PromotionLedger + cortex + bandit already implement it). The ONE missing
      # flag: schema-drift rotation. With it on, a model that emits a
      # schema_invalid payload (e.g. tool_call_without_tool_loop) is demoted +
      # the op rotates to the next ranked candidate — zero loop disruption.
      # JARVIS_RACE_TRIAGE_ENABLED (dual-arm rotation) + the Zero-Trust
      # PromotionLedger (new models quarantined to SPECULATIVE until they prove
      # 10 clean ops) are already default-ON — so an un-vetted model like
      # Nemotron EARNS its way up; it does NOT jump into the COMPLEX main track. ──
      JARVIS_SCHEMA_DRIFT_ROTATION_ENABLED: "1"
      # ── Organism baseline ──
      JARVIS_EPISODIC_CORE_ENABLED: "1"
      JARVIS_CAI_ROUTER_ENABLED: "1"
      JARVIS_KAREN_VOICE_ENABLED: "0"
      JARVIS_ORACLE_PROCESS_ISOLATION_ENABLED: "1"
      # ── Slice 199: Sovereign Tooling & Dual-Identity (HTTPS-token variant) ──
      # The container ships PRs autonomously using the GH_TOKEN already in .env
      # over HTTPS — NO host SSH keys / gh identity mounted (more isolated, not
      # less). Non-interactive hardening: a missing/expired credential FAILS
      # CLOSED rather than hanging on a hidden CLI prompt.
      GIT_TERMINAL_PROMPT: "0"
      # ── Slice 220 — THE AegisClientError ROOT CAUSE (verify-first; NOT a socket/
      # pool bug). The Aegis session TOKEN expires after JARVIS_AEGIS_SESSION_
      # TOKEN_TTL_S (default 3600=1h). The bootstrap PSK is single-use + there is
      # no /session/refresh endpoint yet, so after 1h every Claude call fails
      # "403 psk_already_consumed" -> fallback_failed -> EXHAUSTION (sleep- AND
      # socket-independent; the HTTP session already self-heals via _ensure_http).
      # client.py:14-17 prescribes the fix: "set JARVIS_AEGIS_SESSION_TOKEN_TTL_S
      # to cover the whole intended session duration." 90 days covers the full
      # §41.6 Tier-D unsupervised-evidence window in one continuous run; a restart
      # re-mints anyway. DECLINED the plan's session-factory/pool-reconnect: it
      # would fix a non-existent socket bug while the 403 kept failing. ──
      JARVIS_AEGIS_SESSION_TOKEN_TTL_S: "7776000"
      # ── Slice 222 — QUIET THE SELF-DDOS. The TestFailure sensor fires every
      # ~30s on the SAME 3 known pre-existing failing tests (bg_readonly_cascade
      # — verified identical on clean main days ago), spawning IMMEDIATE ops
      # that all exhaust on DW timeouts and saturate the 3-worker pool —
      # starving GOAL-001::file-00 (priority 4) which sat ENQUEUED for 40 min
      # untouched. The organism was DDoSing itself with unfixable noise.
      # Quiet the sensor in THIS soak (re-enable after the strategic run):
      # poll once/day instead of constantly, fs-event triggers off. NOT metric
      # gaming: the failures are documented pre-existing; this changes WHEN we
      # look, not what exists. QoS reserved-slot build (blueprint, S221) stays
      # the durable fix if starvation persists with the noise quieted. ──
      JARVIS_TEST_FAILURE_FALLBACK_INTERVAL_S: "86400"
      JARVIS_TEST_FAILURE_FS_EVENTS_ENABLED: "0"
      # ── Slice 223 — headless sensor demotion (the durable layer under 222's
      # timer). Even if ANY sensor storms again, test_failure-source ops in a
      # headless soak route STANDARD (DW primary), never IMMEDIATE/Claude-
      # direct — premium tokens reserved for human-reflex + strategic work.
      # Source-discriminated; interactive sessions byte-identical. ──
      JARVIS_SOAK_SENSOR_DEMOTION_ENABLED: "1"
      # ── Slice 224 — Token-Economic Accounting Fabric. ──
      # P2a prompt-prefix cache: the Venom tool catalog + output schema (the
      # biggest FIXED blocks, previously re-billed in full every op) now ride
      # the cached system prefix (~90% cheaper on hits). Builder logic was
      # proven by 7 pre-existing tests; Slice 224 closed the missing call-site
      # wire. Verify live via get_cache_stats hit-rate.
      JARVIS_PROMPT_PREFIX_CACHE_ENABLED: "1"
      # Hourly burn-rate cap (the '$26 can never vanish in a day' rail) —
      # Aegis budget state machine denies premium dispatch past this rate.
      JARVIS_AEGIS_HOURLY_BURN_CAP_USD: "2.00"
      GCM_INTERACTIVE: "never"
      JARVIS_GIT_ORIGIN_SLUG: "drussell23/JARVIS"
      JARVIS_GIT_AUTHOR_NAME: "Ouroboros+Venom"
      JARVIS_GIT_AUTHOR_EMAIL: "ov-soak@users.noreply.github.com"
      # ── Slice 200: Genesis Proposal — SINGLE-USE boot trigger. On the first
      # boot of a fresh .jarvis it deterministically opens ONE milestone review
      # PR (DO-NOT-AUTO-MERGE) to prove the code-shipping highway end-to-end,
      # then writes a durable sentinel and dissolves. The sentinel persists in
      # the bind-mounted .jarvis, so restart:always can never spam PRs. ──
      JARVIS_GENESIS_PROPOSAL_ENABLED: "1"
      # ── Slice 201: Contextual Bandit Routing Advisor. Advisory-only +
      # structurally fail-closed (reorders WITHIN the policy active set; can
      # never select an out-of-policy arm). Online Thompson Sampling learns
      # per-model success rates from live dispatch outcomes. Enabled here so
      # the soak accumulates real reward data; the deterministic router stays
      # authoritative and any error keeps the deterministic order. ──
      JARVIS_BANDIT_ROUTER_ENABLED: "1"
      # ── Slice 203: Strategy Simulator. Telemetry-driven self-prioritization
      # → ONE operator-review PR ([Ouroboros Strategic Proposal], DO-NOT-AUTO-
      # MERGE), deduped by deficiency-set so restart can't spam. Propose-don't-
      # dispose: writes only roadmap.draft.yaml, never signs, never writes the
      # active roadmap — the operator elevates approved goals via strategy_signer. ──
      JARVIS_STRATEGY_SIMULATOR_ENABLED: "1"
      # ── Slice 204: Chronos Continuity Matrix. Non-volatile, hash-chained
      # uptime ledger (.jarvis/chronos_coherence.json) — re-chains on boot so a
      # rebuild preserves evolutionary history (total_operational) while the
      # strict unsupervised interval resets only on a SUPERVISED image change.
      # Sleep-frozen wall-clock is excluded. JARVIS_SOAK_IMAGE_ID lets the
      # ledger tell rebuilds (supervised) from recoveries (unsupervised). ──
      JARVIS_CHRONOS_LEDGER_ENABLED: "1"
      # Slice 215b — image identity DERIVED from the attestation stamp commit
      # (kernel exports GIT_COMMIT at launch). The hardcoded "slice-206-warmup"
      # went stale across SEVEN deploys, so Chronos classified supervised
      # rebuilds as recovery_unsupervised — silently OVERCOUNTING the §41.6
      # unsupervised-interval evidence (the continuity-laundering class S208
      # polices in code, arriving via stale config). Now every attested launch
      # carries its commit as the image id: rebuild => supervised reset, honest.
      JARVIS_SOAK_IMAGE_ID: ${GIT_COMMIT:-dev-unstamped}
      # ── Slice 206: Boot-Warmup Lifecycle. One-time heavy-init lag is recorded
      # as warmup_lag (visible, benign) instead of polluting steady-state
      # control_plane_starvation_events; the heavy builds are pre-warmed off-loop
      # via the existing offload paths. Hard deadline (180s) prevents warmup from
      # ever masking real steady-state starvation. ──
      JARVIS_INIT_LIFECYCLE_ENABLED: "1"
      JARVIS_INIT_WARMUP_MAX_S: "180"
      # ── Slice 207: class-level loop guard. SemanticIndex.build() invoked
      # synchronously on the event loop redirects to the existing thread-
      # offloaded build_async (non-blocking, eventually-consistent) instead of
      # freezing the loop for ~25s — immunizes ANY caller, current or future. ──
      JARVIS_LOOP_GUARD_ENABLED: "1"
      # ── Slice 208-config: the 25s freeze is GIL contention (CPU build in a
      # daemon thread), not on-loop execution — only PROCESS isolation frees
      # the loop. Enables the dormant, tested Slice-150 subprocess build path
      # (helped 23s->13.5s; residual cold-start caller is GOAL-001 below). ──
      JARVIS_COMPUTE_ISOLATION_ENABLED: "1"
      # ── Slice 209 — SOVEREIGN AUTONOMY IGNITION. Operator authored + signed
      # GOAL-001 (eradicate cold-start GIL starvation) into .jarvis/roadmap.yaml
      # (HMAC secret in .env, gitignored). Reader verifies it -> goal
      # decomposition -> M10 ProposalSynthesizer -> the organism attempts its
      # OWN #1 fix. Every patch still passes Iron Gate + SemanticGuardian (incl.
      # Slice-208 deceit detectors) + boundary gate (governance edits ->
      # APPROVAL_REQUIRED -> orange PR for human review, never auto-merge). ──
      JARVIS_ROADMAP_READER_ENABLED: "1"
      JARVIS_GOAL_DECOMPOSITION_ENABLED: "1"
      JARVIS_M10_CADENCE_ENABLED: "1"
      JARVIS_ORANGE_PR_ENABLED: "1"
      # ── Slice 211 — STRATEGIC IGNITION MESH. The roadmap_orchestrator master
      # (the driver that reads the signed roadmap + emits goals into intake) was
      # the third cut wire — default-FALSE + zero callers. Enable it + the GLS
      # daemon now drives it on an adaptive, stress-aware cadence (recovers to
      # base when the vendor stabilizes). THIS is what makes GOAL-001 reach the
      # organism's work queue. ──
      JARVIS_ROADMAP_ORCHESTRATOR_ENABLED: "1"
      JARVIS_PROGRESS_LEDGER_ENABLED: "1"
      # ── Slice 216 — THE no_plan ROOT CAUSE (4th cut wire): the multi-step
      # orchestrator (the engine that turns a decomposed goal's sub-goals into
      # emitted pipeline work) was master-OFF — "NO_PLAN = master off OR empty
      # plan" (multi_step_orchestrator.py:45). The L2 probe proved everything
      # upstream works (reader valid -> decomposition valid, 2 sub-goals ->
      # envelope into router); THIS flag is what lets sub-goals emit. ──
      JARVIS_MULTI_STEP_ORCHESTRATION_ENABLED: "1"
      # §51.11.34-ROADMAP A1 — sub-goal completion writeback (the severed
      # feedback wire). Default-TRUE; pinned explicit here for soak auditability.
      # Closes the loop multi_step EMIT (PROPOSED) -> terminal op (COMPLETED) so
      # done_count advances and GOAL-001::file-00 stops being a hostage.
      JARVIS_SUBGOAL_COMPLETION_WRITEBACK_ENABLED: "1"
      # TEMP A1.5 diagnostic — surface GENERATE/provider INFO on stdout to
      # capture WHY file-00's op fast-fails (generation_failed in 17s). REVERT
      # after diagnosis (default WARNING+ keeps stdout quiet).
      JARVIS_SILENT_BOOT_TERMINAL_LEVEL: "INFO"
      # Slice 225 Phase 2 — Sovereign DW Autarky. When Claude's breaker is
      # OPEN (out-of-credits/terminal_quota), keep the DW primary on the full
      # budget (180s) instead of severing at 30s into a dead lane. Default-TRUE;
      # pinned explicit for soak auditability. THIS is what lets file-00
      # complete on DW alone with Claude unfunded.
      JARVIS_DW_AUTARKY_ENABLED: "1"
      JARVIS_DW_AUTARKY_MAX_BUDGET_S: "180"
      # Slice 228 — agentic family preference (CONFIG, not hardcoded code). With
      # active-param scoring (default-TRUE) demoting low-active MoEs, this boosts
      # the 2026 agentic-tier FAMILIES so gated/tool-loop ops land on a
      # tool-capable titan (Kimi-K2.6 / DeepSeek-V4-Pro / Devstral / GLM-5.1 /
      # Qwen-397B) instead of the 3B-active Qwen-35B. No model NAMES in code.
      JARVIS_DW_FAMILY_PREFERENCE: "moonshotai:1.0,deepseek-ai:0.9,mistralai:0.8,zai-org:0.7,Qwen:0.5"
      # Fallback-sem relief (landmine A): D2/12F-B sem-exhausted fast-fail
      # confirmed live; raise rescue concurrency to the cap so boot-time op
      # stacks queue less (observed 135s sem_wait on concurrency=3).
      JARVIS_FALLBACK_CONCURRENCY: "4"
      # ── Slice 212 — RUNTIME ATTESTATION GATE. At boot, the image's build
      # stamp (commit+dirty) is compared against the operator pin below; a
      # stale rebuild / dirty-tree build / unstamped image FAILS CLOSED with
      # DEPLOYMENT_INTEGRITY_MISMATCH (state=FAILED, loop never runs). The pin
      # is set at launch by launch_dw_cortex_soak.sh; restarts keep it, so
      # later merges to main can't false-trip a healthy soak. ──
      JARVIS_RUNTIME_ATTESTATION_ENABLED: "1"
      JARVIS_ATTESTATION_EXPECTED_COMMIT: ${JARVIS_ATTESTATION_EXPECTED_COMMIT:-}
      # ── Optional: live 🔮 forecast / 💸 sovereignty on the Discord spine ──
      # JARVIS_DISCORD_GATEWAY_ENABLED: "1"   # needs DISCORD_BOT_TOKEN in .env
      # JARVIS_DISCORD_GATES_CHANNEL_ID: "..."
    volumes:
      # Calibration state (dw_threshold_calibration_<model>.json) + episodic memory
      # persist on the host → survive restart (no cortex amnesia).
      - ./.jarvis:/app/.jarvis
    # The battle-test loop IS the supervisor (headless, no wall cap; restart:always
    # gives longevity). Cost cap is the only ceiling — DW is cheap, so $25 lasts.
    # entrypoint OVERRIDE: Slice 199 — soak_git_entrypoint.sh conditions the
    # container for autonomous PR shipping (git identity + gh HTTPS credential
    # helper + isolated git repo bootstrap, all fail-soft) then `exec python3
    # "$@"` with the command args below. Replaces the bare `["python3"]`
    # override; same battle-test invocation, now ship-capable.
    entrypoint: ["bash", "docker/soak_git_entrypoint.sh"]
    command:
      - scripts/ouroboros_battle_test.py
      - --production-soak
      - --headless
      - --cost-cap
      - "10"
      - --idle-timeout
      - "0"
      - --max-wall-seconds
      - "0"
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8g
