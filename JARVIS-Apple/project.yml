name: JARVIS-Apple
options:
  bundleIdPrefix: com.jarvis
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  JARVISKit:
    path: JARVISKit

targets:
  JARVISPhone:
    type: application
    platform: iOS
    sources:
      - JARVISPhone
      - Shared
    dependencies:
      - package: JARVISKit
    settings:
      base:
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "JARVIS needs microphone access for voice commands"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "JARVIS uses on-device speech recognition for voice commands"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        PRODUCT_BUNDLE_IDENTIFIER: com.jarvis.phone
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: "YES"

  JARVISWatch:
    type: application
    platform: watchOS
    sources:
      - JARVISWatch
    dependencies:
      - package: JARVISKit
    settings:
      base:
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "JARVIS needs microphone access for voice commands"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "JARVIS uses on-device speech recognition for voice commands"
        PRODUCT_BUNDLE_IDENTIFIER: com.jarvis.watch
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        GENERATE_INFOPLIST_FILE: "YES"

  JARVISHUD:
    type: application
    platform: macOS
    sources:
      - JARVISHUD
      - Shared
    dependencies:
      - package: JARVISKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jarvis.hud
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "JARVIS needs microphone access for voice commands — say Hey JARVIS to activate"
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "JARVIS uses on-device speech recognition for wake word detection"
    entitlements:
      path: JARVISHUD/JARVISHUD.entitlements
      properties:
        com.apple.security.device.audio-input: true

schemes:
  JARVISPhone:
    build:
      targets:
        JARVISPhone: all
    run:
      config: Debug
    test:
      config: Debug

  JARVISWatch:
    build:
      targets:
        JARVISWatch: all
    run:
      config: Debug

  JARVISHUD:
    build:
      targets:
        JARVISHUD: all
    run:
      config: Debug
      environmentVariables:
        JARVIS_DEVICE_ID: mac-m1-derek
        JARVIS_DEVICE_SECRET: b110e2fd04a9baf2d5923373929af3a06e7abac06168120f063a05329de7151d
        JARVIS_VERCEL_URL: https://jarvis-cloud-five.vercel.app
