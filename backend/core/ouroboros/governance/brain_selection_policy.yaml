schema_version: "1.1.0"
contract_version: "1.1.0"
policy_id: "brain-selection-policy-v2"
generated_at_utc: "2026-03-11T00:00:00Z"

# Supervisor enforces this policy against runtime inventory at boot.
handshake:
  enabled: true
  fail_mode: "hard_fail"   # hard_fail | degraded
  runtime_inventory:
    source: "jprime_endpoint"
    endpoint: "http://127.0.0.1:8000/v1/brains"
    freshness_ttl_seconds: 30
    require_signature: false
  compatibility:
    min_runtime_contract_version: "1.0.0"
    max_runtime_contract_version: "1.0.999"

# Immutable authority constraints
authority_boundaries:
  supervisor_owns:
    - "contract_validation"
    - "active_brain_admission"
    - "active_brain_withdrawal"
    - "infra_lifecycle_control"
  governed_loop_owns:
    - "task_execution"
    - "brain_selection_within_active_set_only"
  prohibited_for_governed_loop:
    - "admit_brain"
    - "start_stop_vm"
    - "override_contract_gate"

brains:
  required:
    - brain_id: "phi3_lightweight"
      provider: "gcp_prime"
      model_name: "llama-3.2-1b"
      gguf_file: "Llama-3.2-1B-Instruct-Q4_K_M.gguf"   # legacy: use model_artifact (canonical for admission gate)
      required_capabilities: ["chat", "trivial_ops"]
      routable: true
      allowed_task_classes: ["tier0", "tier1"]
      cost_class: "free"
      latency_class: "low"
      max_prompt_tokens: 4096
      max_output_tokens: 512
      temperature: 0.1
      compute_class: "cpu"
      min_compute_class: "cpu"
      model_artifact: "Llama-3.2-1B-Instruct-Q4_K_M.gguf"

    - brain_id: "qwen_coder"
      provider: "gcp_prime"
      model_name: "qwen-2.5-coder-7b"
      gguf_file: "qwen2.5-coder-7b-instruct-q4_k_m.gguf"   # legacy: use model_artifact (canonical for admission gate)
      required_capabilities: ["code_generation", "code_refactor"]
      schema_capability: "full_content_only"   # 7B can't produce verbatim unified diffs
      routable: true
      allowed_task_classes: ["tier1", "tier2"]
      cost_class: "low"
      latency_class: "low"
      max_prompt_tokens: 8192
      max_output_tokens: 2048
      temperature: 0.2
      compute_class: "gpu_t4"
      min_compute_class: "gpu_t4"
      model_artifact: "qwen2.5-coder-7b-instruct-q4_k_m.gguf"

    - brain_id: "qwen_coder_14b"
      provider: "gcp_prime"
      model_name: "qwen-2.5-coder-14b"
      gguf_file: "Qwen2.5-Coder-14B-Instruct-Q4_K_M.gguf"
      required_capabilities: ["code_generation", "code_refactor"]
      schema_capability: "full_content_only"   # 14B still not reliable for verbatim diffs
      routable: true
      allowed_task_classes: ["tier2", "tier3"]
      cost_class: "low"
      latency_class: "medium"
      max_prompt_tokens: 12288
      max_output_tokens: 3072
      temperature: 0.2
      compute_class: "gpu_l4"
      min_compute_class: "gpu_t4"
      model_artifact: "Qwen2.5-Coder-14B-Instruct-Q4_K_M.gguf"

    - brain_id: "qwen_coder_32b"
      provider: "gcp_prime"
      model_name: "qwen-2.5-coder-32b"
      gguf_file: "Qwen2.5-Coder-32B-Instruct-Q4_K_M.gguf"
      required_capabilities: ["code_generation", "code_refactor", "complex_reasoning", "architecture_analysis"]
      schema_capability: "full_content_and_diff"   # 32B can produce verbatim unified diffs
      routable: true
      allowed_task_classes: ["tier2", "tier3"]
      cost_class: "medium"
      latency_class: "high"
      max_prompt_tokens: 16384
      max_output_tokens: 4096
      temperature: 0.2
      compute_class: "gpu_l4"
      min_compute_class: "gpu_l4"
      model_artifact: "Qwen2.5-Coder-32B-Instruct-Q4_K_M.gguf"

    - brain_id: "deepseek_r1"
      provider: "gcp_prime"
      model_name: "deepseek-r1-qwen-7b"
      gguf_file: "DeepSeek-R1-Distill-Qwen-7B-Q4_K_M.gguf"   # legacy: use model_artifact (canonical for admission gate)
      required_capabilities: ["complex_reasoning", "architecture_analysis"]
      schema_capability: "full_content_only"   # 7B can't produce verbatim unified diffs
      routable: true
      allowed_task_classes: ["tier3"]
      cost_class: "low"
      latency_class: "medium"
      max_prompt_tokens: 8192
      max_output_tokens: 2048
      temperature: 0.0
      compute_class: "gpu_t4"
      min_compute_class: "gpu_t4"
      model_artifact: "DeepSeek-R1-Distill-Qwen-7B-Q4_K_M.gguf"

  optional:
    - brain_id: "mistral_7b_fallback"
      provider: "gcp_prime"
      model_name: "mistral-7b"
      gguf_file: "mistral-7b-instruct-v0.2.Q4_K_M.gguf"   # legacy: use model_artifact (canonical for admission gate)
      required_capabilities: ["chat", "general_reasoning"]
      routable: true
      allowed_task_classes: ["tier1", "tier2"]
      cost_class: "low"
      latency_class: "medium"
      max_prompt_tokens: 8192
      max_output_tokens: 1024
      temperature: 0.2
      compute_class: "gpu_t4"
      min_compute_class: "gpu_t4"
      model_artifact: "mistral-7b-instruct-v0.2.Q4_K_M.gguf"

allowlist:
  allow_unlisted_runtime_brains: false
  allowed_brain_ids:
    - "phi3_lightweight"
    - "qwen_coder"
    - "qwen_coder_14b"
    - "qwen_coder_32b"
    - "deepseek_r1"
    - "mistral_7b_fallback"

routing:
  precedence:
    - "task_intent"
    - "complexity"
    - "latency_budget"
    - "cost_budget"
    - "health"

  task_class_map:
    tier0: ["phi3_lightweight"]
    tier1: ["phi3_lightweight", "qwen_coder", "mistral_7b_fallback"]
    tier2: ["qwen_coder_14b", "qwen_coder", "mistral_7b_fallback"]
    tier3: ["qwen_coder_32b", "qwen_coder_14b", "deepseek_r1"]

  fallback_chain:
    phi3_lightweight: ["qwen_coder", "mistral_7b_fallback"]
    qwen_coder: ["qwen_coder_14b", "mistral_7b_fallback"]
    qwen_coder_14b: ["qwen_coder", "mistral_7b_fallback"]
    qwen_coder_32b: ["qwen_coder_14b", "qwen_coder", "mistral_7b_fallback"]
    deepseek_r1: ["qwen_coder_32b", "qwen_coder", "mistral_7b_fallback"]

  # Legacy tier-based brain selection (used by existing BrainSelector until wired to new schema)
  legacy_tier_map:
    trivial: "phi3_lightweight"
    planning: "qwen_coder"
    heavy_code: "qwen_coder_32b"
    complex_reasoning: "qwen_coder_32b"

  # Legacy brain definitions for BrainSelector backward compatibility
  legacy_brains:
    phi3_lightweight:
      model_name: "llama-3.2-1b"
      fallback_model: "qwen-2.5-coder-7b"
      schema_capability: "full_content_only"
      max_prompt_tokens: 4096
      max_output_tokens: 512
      temperature: 0.1
      handles:
        - docs_edit
        - comment_append
        - single_line_change
        - monitored_by_marker
        - trivial_annotation

    mistral_planning:
      model_name: "mistral-7b"
      fallback_model: "qwen-2.5-coder-7b"
      schema_capability: "full_content_only"
      max_prompt_tokens: 8192
      max_output_tokens: 1024
      temperature: 0.2
      handles:
        - single_file_fix
        - config_change

    qwen_coder:
      model_name: "qwen-2.5-coder-7b"
      fallback_model: "qwen-2.5-coder-14b"
      schema_capability: "full_content_only"
      max_prompt_tokens: 8192
      max_output_tokens: 2048
      temperature: 0.2
      handles:
        - bug_fix
        - test_update
        - single_file_fix
        - multi_file_light

    qwen_coder_14b:
      model_name: "qwen-2.5-coder-14b"
      fallback_model: "qwen-2.5-coder-7b"
      schema_capability: "full_content_only"
      max_prompt_tokens: 12288
      max_output_tokens: 3072
      temperature: 0.2
      handles:
        - feature_implementation
        - multi_file_heavy
        - api_redesign
        - performance_optimization

    qwen_coder_32b:
      model_name: "qwen-2.5-coder-32b"
      fallback_model: "qwen-2.5-coder-14b"
      schema_capability: "full_content_and_diff"
      max_prompt_tokens: 16384
      max_output_tokens: 4096
      temperature: 0.2
      handles:
        - heavy_refactor
        - feature_implementation
        - multi_file_heavy
        - api_redesign
        - class_extraction
        - performance_optimization
        - architecture_design
        - cross_repo_planning
        - complex_reasoning
        - system_migration
        - root_cause_analysis
        - dependency_graph_analysis

    deepseek_r1:
      model_name: "deepseek-r1-qwen-7b"
      fallback_model: "qwen-2.5-coder-32b"
      schema_capability: "full_content_only"
      max_prompt_tokens: 8192
      max_output_tokens: 2048
      temperature: 0.0
      handles:
        - complex_reasoning
        - root_cause_analysis

runtime_drift:
  reconcile_interval_seconds: 30
  on_required_brain_loss: "degraded_or_fail_by_policy"
  on_optional_brain_loss: "degraded"
  atomic_route_table_updates: true

gates:
  task_gate:
    trivial_patterns:
      - "append.*line"
      - "add.*comment"
      - "add.*marker"
      - "monitored by"
      - "single.*line"
      - "at the.*end of"
      - "^append"
    heavy_patterns:
      - "refactor"
      - "\\bimplement\\b"
      - "redesign"
      - "migrate"
      - "optimize.*performance"
      - "extract.*class"
      - "rewrite"
      - "add.*feature"
    trivial_max_files: 1
    heavy_min_files: 3
    trivial_max_target_lines: 200

  resource_gate:
    local_pressure_redirect_threshold: "ELEVATED"
    local_planning_min_ram_gb: 2.0

  cost_gate:
    daily_budget_usd: 0.50
    claude_fallback_budget_usd: 0.40
    budget_exceeded_action: "queue"
    persist_path: "~/.jarvis/ouroboros/cost_state.json"

# ---------------------------------------------------------------------------
# Provider Topology — Hard-segmented DW model mapping (Manifesto §5)
# ---------------------------------------------------------------------------
#
# Strict Cognitive Segmentation. Enforced by `provider_topology.py` and
# consumed by `candidate_generator.py`, `doubleword_provider.py`, and
# `semantic_triage.py`. Do not mutate at runtime — any change here is a
# deliberate architectural decision.
#
# Calibration: bbpst3ebf live-fire (2026-04-14) proved DW models time out
# on 120s Tier 0 RT for COMPLEX architectural GENERATE, regardless of
# whether the backing model is Qwen 3.5 397B or Gemma 4 31B. The response
# is not to extend timeouts but to harden the topology: DW is excluded
# from the Prefrontal Cortex entirely.
#
# Prefrontal Cortex (Claude only):
#   - IMMEDIATE  — fast reflex, deep context, strict deadlines
#   - COMPLEX    — architectural generation, Venom tool loops
#   - STANDARD   — midbrain sealed, cascades to Claude (see below)
# Basal Ganglia (Gemma 4 31B, strictly confined to structured-JSON callers):
#   - semantic_triage — pre-generation file intelligence
#   - ouroboros_plan  — plan-phase structured JSON output
#
# BACKGROUND + SPECULATIVE are SEALED. Alignment test bt-2026-04-14-182446
# produced 0/13 Gemma BG successes (12× 180s timeout, 1× schema_invalid)
# even with a right-sized 2,836-token envelope — the root cause is
# provider-side SSE stream stalling, not prompt size. We will NOT cascade
# these routes to Claude: routing continuous background daemons to a
# $3/$15 per M-token provider violates the unit economics of scalable
# autonomy. Until a viable, cost-effective inference endpoint is secured,
# BG/SPEC generation is paused via skip-and-queue.
#
# STANDARD is also SEALED as of bt-2026-04-14-203740 (Qwen 397B isolation
# benchmark). With the Claude fallback severed, Qwen 3.5 397B produced
# ZERO valid candidates across the run: Tier 0 RT streams started, then
# stalled mid-generation (``SSE stream stalled (no data for 30s)``), budget
# exhausted at 71.5s, and the FSM hit ``TIMEOUT`` on every attempt. Same
# failure signature as Gemma on BACKGROUND — provider-side stream stall,
# not prompt size. Unlike BG/SPEC, STANDARD DOES cascade to Claude: it
# carries bounded-volume mid-tier ops where Claude's unit economics are
# acceptable and speed matters. DW is confined to tiny-payload named
# callers (semantic_triage, ouroboros_plan) until DoubleWord repairs
# their SSE generation endpoint.
doubleword_topology:
  schema_version: "topology.1"
  enabled: true
  routes:
    immediate:
      dw_allowed: false
      block_mode: "cascade_to_claude"
      reason: "Prefrontal cortex — Claude only. 120s DW RT budget is insufficient for fast-reflex ops with Venom tool loops."
    complex:
      dw_allowed: false
      block_mode: "cascade_to_claude"
      reason: "Prefrontal cortex — Claude only. Live-fire bbpst3ebf proved DW (both 397B and Gemma 4 31B) times out on architectural COMPLEX GENERATE within 120s Tier 0 RT."
    standard:
      dw_allowed: false
      block_mode: "cascade_to_claude"
      reason: "Qwen 397B verified stream-stalling without candidate generation in bt-2026-04-14-203740. DW Tier 0 sealed to prevent latency debt."
    background:
      dw_allowed: false
      block_mode: "skip_and_queue"
      reason: "Gemma 4 31B stream-stalls on DW endpoint even at <2K tokens. Background generation paused to preserve Claude compute runway."
    speculative:
      dw_allowed: false
      block_mode: "skip_and_queue"
      reason: "Gemma 4 31B stream-stalls on DW endpoint even at <2K tokens. Background generation paused to preserve Claude compute runway."
  callers:
    semantic_triage:
      dw_model: "google/gemma-4-31B-it"
      reason: "Basal ganglia — native function-calling for triage JSON. Replaces Qwen 3.5 35B."
    ouroboros_plan:
      dw_model: "google/gemma-4-31B-it"
      reason: "Basal ganglia — structured JSON plan generation during PLAN phase."
    compaction:
      # Migrated 2026-04-27 (PRD §3.7) — gemma-4-31B-it → Qwen3-14B-FP8.
      # Qwen3-14B-FP8 is the catalog-published "summarization" model
      # (docs.doubleword.ai/inference-api/model-pricing); 262K context
      # handles deep tool-loop history; pricing $0.05 in / $0.20 out
      # per M tokens vs gemma-4-31B's $0.14 in / $0.40 out — 2-3× cheaper
      # input + 2× cheaper output, AND the model was specifically tuned
      # for summarization rather than function-calling. Compaction's
      # workload (deterministic structured summary over bounded tool-
      # loop memory) doesn't need gemma's function-calling strength.
      # vs Claude Sonnet 4.6 ($3 / $15 per M): ~75× cheaper output.
      # SHADOW mode by default (JARVIS_COMPACTION_CALLER_ENABLED) so this
      # swap is observation-only until the caller flag flips.
      dw_model: "Qwen/Qwen3-14B-FP8"
      reason: "Functions-not-Agents Phase 0. Structured summary over ToolLoop memory entries — fully-bounded input, short output (<1KB), trivial anti-hallucination check (subset of entry-keys). First non-streaming complete_sync() caller. SHADOW mode by default (JARVIS_COMPACTION_CALLER_ENABLED). Migrated from google/gemma-4-31B-it on 2026-04-27 (PRD §3.7) — Qwen3-14B-FP8 is catalog-tuned for summarization at $0.05 in / $0.20 out per M (~75× cheaper output than Claude Sonnet 4.6, ~2× cheaper than gemma-4-31B-it)."

error_codes:
  - "CONTRACT_SCHEMA_INVALID"
  - "CONTRACT_VERSION_INCOMPATIBLE"
  - "CONTRACT_REQUIRED_BRAIN_MISSING"
  - "CONTRACT_CAPABILITY_MISMATCH"
  - "RUNTIME_INVENTORY_STALE"
  - "FSM_SUSPENDED_PREEMPTED"
  - "FSM_REHYDRATE_BUDGET_EXHAUSTED"

# compute_class_rank: used by the admission gate to compare VM compute_class against brain min_compute_class.
# Higher rank = more capable. A VM must satisfy rank(vm_class) >= rank(min_compute_class).
compute_class_rank:
  cpu: 0
  gpu_t4: 1
  gpu_l4: 2
  gpu_v100: 3
  gpu_a100: 4
