# Trinity Capability Registry
# ===========================
# Hand-curated mapping of capabilities across JARVIS/Prime/Reactor.
# Fed into TopologyMap at boot. CuriosityEngine scores inactive capabilities
# using Shannon Entropy + UCB1 to identify the highest-value exploration targets.
#
# Fields:
#   name:         snake_case unique identifier
#   domain:       capability grouping (used for Shannon Entropy per-domain)
#   repo_owner:   jarvis | prime | reactor
#   active:       true if currently wired and functional
#   dependencies: list of capability names this depends on (optional)
#
# Domains:
#   llm_routing      — model selection, inference backends, brain routing
#   voice            — STT, TTS, voice auth, audio processing
#   vision           — screen capture, OCR, vision analysis
#   governance       — pipeline phases, sensors, autonomy tiers
#   infrastructure   — GCP VM lifecycle, Cloud SQL, cost tracking
#   neural_mesh      — neural mesh agent capabilities
#   data_io          — embeddings, persistence, semantic search
#   exploration      — proactive drive, curiosity engine, sentinel

capabilities:

